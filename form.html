<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    meu formulario

    <img width="100px" id="foto_do_pet" />

    <script>
      function capturaUrl() {
        var dadosDaUrl = new URLSearchParams(window.location.search);
        var imagemDaUrl = dadosDaUrl.get("imagem");
        document.getElementById("foto_do_pet").setAttribute("src", imagemDaUrl);
      }

      capturaUrl();
    </script>
  </body>
</html>
